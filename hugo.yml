baseURL: "https://yodg.netlify.app/"
locale: "en-us"
title: "yodg"
theme: "hugo-theme-console"

taxonomies:
  category: "categories"
  tag: "tags"
  person: "people"

params:
  description: "Hello world!"
  animateStyle: "animate-fade-up" # Animation style for content

  navlinks:
    - name: "about/"
      url: "/about/"
